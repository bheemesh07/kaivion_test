<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 90" width="420" height="90">
  <defs>
    <linearGradient id="ge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="gt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Outer bg diamond -->
  <g transform="translate(48,45)">
    <polygon points="0,-42 37,0 0,42 -37,0" fill="#0d0525"/>
    <polygon points="0,-42 37,0 0,42 -37,0" fill="none" stroke="url(#ge)" stroke-width="1.4" opacity=".55"/>
    <polygon points="0,-46 41,0 0,46 -41,0" fill="none" stroke="url(#ge)" stroke-width=".8" opacity=".2"/>
    <!-- Inner filled diamond -->
    <polygon points="0,-32 28,0 0,32 -28,0" fill="url(#ge)"/>
    <!-- Facet highlight -->
    <polygon points="0,-32 12,-10 0,-7 -12,-10" fill="white" opacity=".38"/>
    <!-- Facet lines -->
    <line x1="0"   y1="-32" x2="28"  y2="0"  stroke="white" stroke-width=".9" opacity=".22"/>
    <line x1="0"   y1="-32" x2="-28" y2="0"  stroke="white" stroke-width=".9" opacity=".1"/>
    <line x1="-28" y1="0"   x2="0"   y2="32" stroke="white" stroke-width=".9" opacity=".08"/>
    <line x1="28"  y1="0"   x2="0"   y2="32" stroke="white" stroke-width=".9" opacity=".07"/>
    <line x1="-28" y1="0"   x2="28"  y2="0"  stroke="white" stroke-width=".5" opacity=".13"/>
    <!-- K inside — lower arm flows out to right tip -->
    <line x1="-8" y1="-16" x2="-8" y2="16"  stroke="white" stroke-width="4"   stroke-linecap="round"/>
    <line x1="-8" y1="0"   x2="8"  y2="-16" stroke="white" stroke-width="3.8" stroke-linecap="round"/>
    <line x1="-8" y1="0"   x2="28" y2="16"  stroke="white" stroke-width="3.8" stroke-linecap="round"/>
  </g>
  <!-- AIVION wordmark starts immediately after diamond right tip (48+37=85) -->
  <text font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="50" letter-spacing="-1">
    <tspan x="85" y="62" font-weight="900" fill="url(#gt)">AI</tspan><tspan font-weight="200" fill="#6a85a8" letter-spacing="1">VION</tspan>
  </text>
</svg>
